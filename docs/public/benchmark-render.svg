<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 310">
  <defs>
    <linearGradient id="oxGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a5cff"/>
      <stop offset="100%" style="stop-color:#4acdff"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f607b"/>
      <stop offset="100%" style="stop-color:#8190b0"/>
    </linearGradient>
  </defs>

  <style>
    .title { font: bold 14px IBM Plex Sans, system-ui, sans-serif; fill: #131a30; }
    .label { font: 12px IBM Plex Sans, system-ui, sans-serif; fill: #4f607b; }
    .value { font: bold 11px IBM Plex Sans, system-ui, sans-serif; fill: #131a30; }
    .unit { font: 10px IBM Plex Sans, system-ui, sans-serif; fill: #8190b0; }
    .ratio { font: bold 10px IBM Plex Sans, system-ui, sans-serif; fill: #364462; }
  </style>

  <!-- Background -->
  <rect width="650" height="310" fill="#f5f7fb" rx="8"/>

  <!-- Title -->
  <text x="325" y="24" text-anchor="middle" class="title">Parse + Render Speed (Large 48.7KB)</text>

  <!-- ox-content: 3,143 ops/s = 1.00x -->
  <text x="120" y="58" text-anchor="end" class="label">@ox-content/napi</text>
  <rect x="130" y="45" width="400" height="20" rx="4" fill="url(#oxGrad)"/>
  <text x="500" y="58" class="ratio" fill="#fff">1.00x</text>
  <text x="540" y="58" class="value">3,143</text>
  <text x="585" y="58" class="unit">ops/s</text>

  <!-- Bun.markdown.html: 2,879 ops/s = 1.09x -->
  <text x="120" y="88" text-anchor="end" class="label">Bun.markdown.html</text>
  <rect x="130" y="75" width="366" height="20" rx="4" fill="url(#grayGrad)"/>
  <text x="504" y="88" class="value">2,879</text>
  <text x="549" y="88" class="unit">ops/s</text>
  <text x="594" y="88" class="ratio">1.09x</text>

  <!-- md4x (napi): 2,645 ops/s = 1.19x -->
  <text x="120" y="118" text-anchor="end" class="label">md4x (napi)</text>
  <rect x="130" y="105" width="337" height="20" rx="4" fill="url(#grayGrad)"/>
  <text x="475" y="118" class="value">2,645</text>
  <text x="520" y="118" class="unit">ops/s</text>
  <text x="565" y="118" class="ratio">1.19x</text>

  <!-- md4w (md4c): 1,866 ops/s = 1.68x -->
  <text x="120" y="148" text-anchor="end" class="label">md4w (md4c)</text>
  <rect x="130" y="135" width="238" height="20" rx="4" fill="url(#grayGrad)"/>
  <text x="376" y="148" class="value">1,866</text>
  <text x="421" y="148" class="unit">ops/s</text>
  <text x="466" y="148" class="ratio">1.68x</text>

  <!-- markdown-it: 526 ops/s = 5.98x -->
  <text x="120" y="178" text-anchor="end" class="label">markdown-it</text>
  <rect x="130" y="165" width="67" height="20" rx="4" fill="url(#grayGrad)"/>
  <text x="205" y="178" class="value">526</text>
  <text x="237" y="178" class="unit">ops/s</text>
  <text x="287" y="178" class="ratio">5.98x</text>

  <!-- marked: 305 ops/s = 10.30x -->
  <text x="120" y="208" text-anchor="end" class="label">marked</text>
  <rect x="130" y="195" width="39" height="20" rx="4" fill="url(#grayGrad)"/>
  <text x="177" y="208" class="value">305</text>
  <text x="209" y="208" class="unit">ops/s</text>
  <text x="259" y="208" class="ratio">10.30x</text>

  <!-- micromark: 29 ops/s = 108.38x -->
  <text x="120" y="238" text-anchor="end" class="label">micromark</text>
  <rect x="130" y="225" width="4" height="20" rx="2" fill="url(#grayGrad)"/>
  <text x="142" y="238" class="value">29</text>
  <text x="162" y="238" class="unit">ops/s</text>
  <text x="207" y="238" class="ratio">108.38x</text>

  <!-- remark: 24 ops/s = 130.96x -->
  <text x="120" y="268" text-anchor="end" class="label">remark</text>
  <rect x="130" y="255" width="3" height="20" rx="2" fill="url(#grayGrad)"/>
  <text x="141" y="268" class="value">24</text>
  <text x="161" y="268" class="unit">ops/s</text>
  <text x="206" y="268" class="ratio">130.96x</text>

  <!-- Footer -->
  <text x="325" y="300" text-anchor="middle" class="unit">Higher is better. Ratio shows how much slower vs ox-content.</text>
</svg>
