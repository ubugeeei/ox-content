<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }}</title>
  {% if let Some(description) = description %}
  <meta name="description" content="{{ description }}">
  {% endif %}
  <style>
    :root {
      --ox-slide-font-sans: {{ theme.font_sans|safe }};
      --ox-slide-font-mono: {{ theme.font_mono|safe }};
      --ox-slide-text: {{ theme.color_text|safe }};
      --ox-slide-text-muted: {{ theme.color_text_muted|safe }};
      --ox-slide-primary: {{ theme.color_primary|safe }};
      --ox-slide-border: {{ theme.color_border|safe }};
      --ox-slide-canvas: {{ theme.canvas_background|safe }};
      --ox-slide-surface: {{ theme.surface_background|safe }};
      --ox-slide-surface-border: {{ theme.surface_border|safe }};
      --ox-slide-surface-shadow: {{ theme.surface_shadow|safe }};
      --ox-slide-aspect-ratio: {{ theme.aspect_ratio|safe }};
      --ox-slide-padding: {{ theme.padding|safe }};
      --ox-slide-page-width: {{ page_width|safe }};
      --ox-slide-page-height: {{ page_height|safe }};
    }
    @page {
      size: {{ page_width|safe }} {{ page_height|safe }};
      margin: 0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--ox-slide-font-sans);
      color: var(--ox-slide-text);
      background: white;
    }
    .ox-slide-print-page {
      width: var(--ox-slide-page-width);
      height: var(--ox-slide-page-height);
      padding: 0.12in;
      display: grid;
      background: var(--ox-slide-canvas);
      break-after: page;
      page-break-after: always;
    }
    .ox-slide-print-page:last-of-type {
      break-after: auto;
      page-break-after: auto;
    }
    .ox-slide-print-frame {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      background: var(--ox-slide-surface);
      border: 1px solid var(--ox-slide-surface-border);
      border-radius: 12px;
      box-shadow: var(--ox-slide-surface-shadow);
      padding: var(--ox-slide-padding);
      overflow: hidden;
    }
    .ox-slide-print-header,
    .ox-slide-print-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--ox-slide-text-muted);
      font-size: 0.82rem;
    }
    .ox-slide-print-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ox-slide-text);
    }
    .ox-slide-print-content {
      min-height: 0;
      font-size: clamp(1rem, 1.45vw, 1.4rem);
      line-height: 1.45;
      overflow: hidden;
    }
    .ox-slide-print-content > :first-child { margin-top: 0; }
    .ox-slide-print-content > :last-child { margin-bottom: 0; }
    .ox-slide-print-content img,
    .ox-slide-print-content svg,
    .ox-slide-print-content video,
    .ox-slide-print-content canvas {
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  {% for slide in slides %}
  <section class="ox-slide-print-page">
    <article class="ox-slide-print-frame">
      <header class="ox-slide-print-header">
        <span>{{ deck_title }}</span>
        <span>{{ slide.slide_number }} / {{ slide.slide_count }}</span>
      </header>
      <div class="ox-slide-print-content">{{ slide.slide_content_html|safe }}</div>
      <footer class="ox-slide-print-footer">
        <span class="ox-slide-print-title">{{ slide.slide_title }}</span>
        <span>{{ slide.slide_number }} / {{ slide.slide_count }}</span>
      </footer>
    </article>
  </section>
  {% endfor %}
</body>
</html>
