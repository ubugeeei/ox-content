[tools]
rust = "1.92"
node = "24"

[env]
RUST_BACKTRACE = "1"

[tasks.build]
description = "Build everything (Rust + NAPI + npm packages)"
run = "pnpm exec vp run --workspace-root build"

[tasks."build:rust"]
description = "Build Rust crates"
run = "pnpm exec vp run --workspace-root build:rust"

[tasks."build:rust-release"]
description = "Build Rust crates in release mode"
run = "pnpm exec vp run --workspace-root build:rust-release"

[tasks."build:napi"]
description = "Build NAPI bindings"
run = "pnpm exec vp run --workspace-root build:napi"

[tasks."build:npm"]
description = "Build npm packages"
run = "pnpm exec vp run --workspace-root build:npm"

[tasks."build:wasm"]
description = "Build WASM bindings"
run = "pnpm exec vp run --workspace-root build:wasm"

[tasks.test]
description = "Run all tests (Rust + TypeScript)"
run = "pnpm exec vp run --workspace-root test"

[tasks."test:rust"]
description = "Run Rust tests"
run = "pnpm exec vp run --workspace-root test:rust"

[tasks."test:rust-verbose"]
description = "Run Rust tests with verbose output"
run = "pnpm exec vp run --workspace-root test:rust-verbose"

[tasks."test:ts"]
description = "Run JavaScript tests with Vite+"
run = "pnpm exec vp run --workspace-root test:ts"

[tasks.check]
description = "Check all (Rust + TypeScript)"
run = "pnpm exec vp run --workspace-root check"

[tasks."check:rust"]
description = "Check Rust crates"
run = "pnpm exec vp run --workspace-root check:rust"

[tasks.clippy]
description = "Run clippy on all crates"
run = "pnpm exec vp run --workspace-root clippy"

[tasks.fmt]
description = "Format all code (Rust + TypeScript)"
run = "pnpm exec vp run --workspace-root fmt"

[tasks."fmt:rust"]
description = "Format Rust code"
run = "pnpm exec vp run --workspace-root fmt:rust"

[tasks."fmt:check"]
description = "Check all formatting"
run = "pnpm exec vp run --workspace-root fmt:check"

[tasks."fmt:rust-check"]
description = "Check Rust formatting"
run = "pnpm exec vp run --workspace-root fmt:rust-check"

[tasks."fmt:ts"]
description = "Format JavaScript and TypeScript code"
run = "pnpm exec vp run --workspace-root fmt:ts"

[tasks."fmt:ts-check"]
description = "Check JavaScript and TypeScript formatting"
run = "pnpm exec vp run --workspace-root fmt:ts-check"

[tasks.lint]
description = "Run all lints (Rust + TypeScript)"
run = "pnpm exec vp run --workspace-root lint"

[tasks."lint:rust"]
description = "Run Rust lints (clippy)"
run = "pnpm exec vp run --workspace-root lint:rust"

[tasks."lint:ts"]
description = "Run JavaScript and TypeScript lints (Vite+)"
run = "pnpm exec vp run --workspace-root lint:ts"

[tasks."check:ts"]
description = "Run JavaScript and TypeScript checks"
run = "pnpm exec vp run --workspace-root check:ts"

[tasks.bench]
description = "Run all benchmarks (Rust + JS)"
run = "pnpm exec vp run --workspace-root bench"

[tasks."bench:rust"]
description = "Run Rust benchmarks"
run = "pnpm exec vp run --workspace-root bench:rust"

[tasks."bench:parse"]
description = "Run parse/render speed benchmarks"
run = "pnpm exec vp run --workspace-root bench:parse"

[tasks."bench:bundle"]
description = "Run bundle size benchmarks"
run = "pnpm exec vp run --workspace-root bench:bundle"

[tasks."doc:cargo"]
description = "Generate Rust documentation"
run = "pnpm exec vp run --workspace-root doc:cargo"

[tasks."doc:cargo-open"]
description = "Generate and open Rust documentation"
run = "pnpm exec vp run --workspace-root doc:cargo-open"

[tasks.clean]
description = "Clean build artifacts"
run = "pnpm exec vp run --workspace-root clean"

[tasks.napi-prepublish]
description = "Prepare NAPI package for publishing"
run = "pnpm exec vp run --workspace-root napi-prepublish"

[tasks.ci]
description = "Run CI checks"
run = "pnpm exec vp run --workspace-root ci"

[tasks.ready]
description = "Run all checks before committing"
run = "pnpm exec vp run --workspace-root ready"

[tasks.coverage]
description = "Generate test coverage report"
run = "pnpm exec vp run --workspace-root coverage"

[tasks.setup]
description = "Setup development environment"
run = "pnpm exec vp run --workspace-root setup"

[tasks.watch]
description = "Watch for changes and run tests"
run = "pnpm exec vp run --workspace-root watch"

[tasks.watch-check]
description = "Watch for changes and run check"
run = "pnpm exec vp run --workspace-root watch-check"

[tasks.playground]
description = "Start the playground"
run = "pnpm exec vp run --workspace-root playground"

[tasks.integ-vue]
description = "Start Vue integration example"
run = "pnpm exec vp run --workspace-root integ-vue"

[tasks.integ-react]
description = "Start React integration example"
run = "pnpm exec vp run --workspace-root integ-react"

[tasks.integ-svelte]
description = "Start Svelte integration example"
run = "pnpm exec vp run --workspace-root integ-svelte"

[tasks.ssg-vite]
description = "Start Vite SSG example"
run = "pnpm exec vp run --workspace-root ssg-vite"

[tasks.plugin-markdown-it]
description = "Run markdown-it plugin example"
run = "pnpm exec vp run --workspace-root plugin-markdown-it"

[tasks.plugin-rehype]
description = "Run rehype plugin example"
run = "pnpm exec vp run --workspace-root plugin-rehype"

[tasks.gen-source-docs]
description = "Run source docs generator example"
run = "pnpm exec vp run --workspace-root gen-source-docs"

[tasks."dev:docs"]
description = "Start documentation dev server"
run = "pnpm exec vp run --workspace-root dev:docs"

[tasks."dev:playground"]
description = "Start playground dev server"
run = "pnpm exec vp run --workspace-root dev:playground"

[tasks.dev]
description = "Start documentation and playground dev servers"
run = "pnpm exec vp run --workspace-root dev"

[tasks.dev-build]
description = "Build documentation site"
run = "pnpm exec vp run --workspace-root dev-build"

[tasks.dev-preview]
description = "Preview documentation build"
run = "pnpm exec vp run --workspace-root dev-preview"

[tasks.install]
description = "Install workspace dependencies with Vite+"
run = "pnpm --package=vite-plus dlx vp run --workspace-root install"

[tasks.release]
description = "Release a new version"
usage = '''
arg "<version>" help="Version bump type (alpha|beta|patch|minor|major) or explicit version (x.y.z)"
'''
run = "pnpm exec vp run --workspace-root release -- ${usage_version}"

[tasks.examples-install]
description = "Install all example dependencies"
run = "pnpm exec vp run --workspace-root examples-install"
